<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ZJU Pixel Home - Interactive</title>
<style>
  :root {
    --paper: #fff6df;
    --paper-2: #fff0cc;
    --ink: #222322;
    --muted: #b9aa90;
    --line: #decfb4;
    --shadow: rgba(119, 92, 49, .18);
    --red: #c85454;
    --blue: #507edb;
    --green: #67b894;
    --orange: #e8893e;
    --purple: #7267a8;
    --gray: #777887;
    --sky: #bbecff;
    --lake: rgba(172, 217, 204, .45);
    --toast: rgba(255, 247, 226, .96);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    display: grid;
    place-items: center;
    background: #151515;
    font-family: "PingFang SC", "Microsoft YaHei", ui-sans-serif, system-ui, -apple-system, sans-serif;
    color: var(--ink);
  }

  .phone {
    position: relative;
    overflow: hidden;
    width: min(100vw, 430px);
    height: min(100vh, 930px);
    aspect-ratio: 853 / 1844;
    background:
      radial-gradient(circle at 18% 5%, rgba(255,255,255,.95), transparent 34%),
      linear-gradient(135deg, #fff6df 0%, #fff0cc 50%, #fff6de 100%);
    isolation: isolate;
    image-rendering: auto;
  }

  .phone::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(250, 231, 185, .17) 1px, transparent 1px),
      linear-gradient(90deg, rgba(250, 231, 185, .13) 1px, transparent 1px);
    background-size: 12px 12px;
    opacity: .28;
    mix-blend-mode: multiply;
    pointer-events: none;
    z-index: 1;
  }

  .pixelated { image-rendering: pixelated; image-rendering: crisp-edges; }

  .status {
    position: absolute;
    top: 18px;
    left: 28px;
    right: 24px;
    height: 42px;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 800;
    letter-spacing: 1px;
  }
  .status .time { font-size: 27px; }
  .status-right { display: flex; gap: 10px; align-items: center; font-size: 15px; }
  .wifi {
    width: 26px; height: 20px; position: relative;
  }
  .wifi span {
    position: absolute; left: 50%; transform: translateX(-50%);
    border: 4px solid #222; border-color: #222 transparent transparent transparent;
    border-radius: 50%;
  }
  .wifi span:nth-child(1) { width: 27px; height: 23px; top: 1px; }
  .wifi span:nth-child(2) { width: 18px; height: 15px; top: 8px; }
  .wifi span:nth-child(3) { width: 8px; height: 6px; top: 15px; background:#222; border:0; }
  .battery { width: 27px; height: 15px; border: 2px solid #222; border-radius: 2px; position: relative; padding: 2px; }
  .battery::after { content:""; position:absolute; right:-5px; top:4px; width:3px; height:6px; background:#222; border-radius:0 2px 2px 0; }
  .battery i { display:block; height:100%; width:17%; background:#d55c4f; }

  .background {
    position: absolute; inset: 0; z-index: 0;
    pointer-events: none;
  }
  .cloud { position:absolute; background: var(--sky); opacity:.72; filter: blur(.1px); }
  .cloud.c1 { top: 210px; left: 238px; width:170px; height:58px; clip-path: polygon(0 45%,12% 45%,12% 28%,26% 28%,26% 12%,43% 12%,43% 28%,60% 28%,60% 45%,74% 45%,74% 60%,100% 60%,100% 100%,0 100%); }
  .cloud.c2 { top: 116px; right: -6px; width:70px; height:80px; clip-path: polygon(0 38%,15% 38%,15% 20%,36% 20%,36% 0,64% 0,64% 25%,85% 25%,85% 42%,100% 42%,100% 100%,0 100%); }
  .cloud.c3 { top: 450px; left: 285px; width:120px; height:48px; opacity:.35; }
  .small-cloud { position: absolute; top: 252px; left: 320px; width: 72px; height: 28px; opacity: .9; background:#fff5cf; clip-path: polygon(0 64%,14% 64%,14% 43%,28% 43%,28% 24%,52% 24%,52% 39%,76% 39%,76% 63%,100% 63%,100% 100%,0 100%); }

  .campus-base {
    position:absolute; left:205px; right:-20px; bottom:142px; height:210px;
    background: linear-gradient(to bottom, rgba(237, 218, 178, .65), rgba(229, 208, 168, .35));
    clip-path: polygon(0 38%, 8% 34%, 8% 25%, 15% 25%, 15% 16%, 100% 16%, 100% 100%, 0 100%);
    opacity:.78;
  }
  .campus-base::after { content:""; position:absolute; inset: 75px 14px 0 10px; background: repeating-linear-gradient(90deg, transparent 0 27px, rgba(205,176,128,.45) 27px 33px, transparent 33px 58px); opacity:.55; }
  .lake { position:absolute; bottom:90px; left:0; right:0; height:100px; background: linear-gradient(to bottom, rgba(168,216,204,.45), rgba(238,226,189,.35)); }
  .lake::before { content:""; position:absolute; inset:18px 0 auto 0; height:1px; background: rgba(105,139,126,.24); box-shadow: 0 12px 0 rgba(105,139,126,.18), 0 28px 0 rgba(105,139,126,.1); }
  .tower {
    position:absolute;
    width:66px; height:330px; right:70px; top:116px;
    filter: drop-shadow(0 6px 0 rgba(161,128,83,.18));
  }
  .tower-top {
    position:absolute; left:10px; top:0; width:48px; height:62px;
    background: #edd9b7;
    border: 2px solid #d3b98d;
    transform: skewY(-2deg);
  }
  .tower-top::before { content:""; position:absolute; left:-2px; top:-9px; width:52px; height:11px; background:#ead2a7; border: 2px solid #d3b98d; transform: skewX(-8deg); }
  .tower-top .slot { position:absolute; top:23px; width:7px; height:28px; background:#75bdd4; border:2px solid #d3b98d; }
  .tower-top .slot:nth-child(1) { left:10px; }
  .tower-top .slot:nth-child(2) { left:28px; }
  .tower-body {
    position:absolute; left:15px; top:60px; width:44px; height:268px;
    background: linear-gradient(90deg,#f0dcb8 0 67%,#e5c89a 68%);
    border-left:2px solid #d3b98d; border-right:2px solid #d3b98d;
  }
  .tower-body::before {
    content:""; position:absolute; left:13px; top:64px; bottom:12px; width:11px;
    background: repeating-linear-gradient(to bottom,#77c4db 0 15px,#d1ba8e 15px 21px);
    border-left:2px solid #d1ba8e; border-right:2px solid #d1ba8e;
  }
  .tower-body::after {
    content:""; position:absolute; right:6px; top:52px; bottom:20px; width:6px;
    background: repeating-linear-gradient(to bottom,#75bdd4 0 12px,#d1ba8e 12px 21px);
  }
  .clock {
    position:absolute; left:8px; top:34px; width:29px; height:29px;
    border: 2px dashed #bda37a; border-radius: 50%; background:#f2dfbd;
  }
  .clock::before { content:""; position:absolute; width:2px; height:9px; background:#bda37a; left:13px; top:5px; transform-origin: bottom; transform: rotate(0deg); }
  .clock::after { content:""; position:absolute; width:8px; height:2px; background:#bda37a; left:13px; top:14px; transform-origin:left; transform: rotate(42deg); }
  .portal {
    position:absolute; right:58px; top:400px; width:48px; height:78px;
    background:#ead1a5; border:2px solid #b99c71;
    box-shadow: -8px 8px 0 rgba(183,146,93,.36);
  }
  .portal::before { content:""; position:absolute; left:8px; top:13px; width:30px; height:55px; background:#285b6f; border:2px solid #1c4555; box-shadow: inset 6px 0 0 #3d7891; }
  .portal::after { content:""; position:absolute; left:28px; top:41px; width:4px; height:4px; background:#eac67a; }
  .steps { position:absolute; right:85px; top:480px; width:95px; height:120px; transform: skewY(-26deg); }
  .steps span { display:block; width:100%; height:13px; margin-top:5px; background:#c3a078; border-top:2px solid #f0d3a6; box-shadow: 9px 10px 0 rgba(116,86,54,.16); }
  .plinth { position:absolute; right:62px; top:596px; width:132px; height:28px; background:#d7bb8d; border-top:3px solid #f2d8ac; }
  .trees { position:absolute; right:-16px; bottom:252px; width:106px; height:184px; opacity:.85; }
  .leaf { position:absolute; background:#86b870; width:54px; height:54px; border-radius:4px; clip-path: polygon(24% 0, 72% 0, 72% 20%, 96% 20%, 96% 68%, 74% 68%, 74% 96%, 20% 96%, 20% 72%, 0 72%, 0 24%, 24% 24%); }
  .leaf.l1 { top:0; left:42px; } .leaf.l2 { top:38px; left:12px; } .leaf.l3 { top:78px; left:46px; } .leaf.l4 { top:96px; left:3px; }
  .trunk { position:absolute; bottom:0; left:51px; width:14px; height:100px; background:#99744d; }

  .weather-card {
    position:absolute;
    top: 80px;
    left: 15px;
    width: 210px;
    height: 182px;
    z-index: 5;
    padding: 20px 22px 16px 22px;
    background: rgba(255,248,226,.65);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: 0 2px 0 rgba(196,172,128,.32), inset 0 0 0 1px rgba(255,255,255,.35);
    backdrop-filter: blur(2px);
    cursor: pointer;
  }
  .weather-top { display:grid; grid-template-columns: 84px 1fr; align-items:center; }
  .rain-icon { width:74px; height:72px; position:relative; }
  .rain-icon .cloud-pixel { position:absolute; left:7px; top:8px; width:70px; height:36px; background:#bfd1db; clip-path: polygon(0 53%,13% 53%,13% 35%,27% 35%,27% 17%,40% 17%,40% 2%,63% 2%,63% 16%,78% 16%,78% 34%,92% 34%,92% 53%,100% 53%,100% 77%,0 77%); }
  .drop { position:absolute; width:6px; height:12px; background:#6aa8df; top:55px; transform: skewX(-12deg); }
  .drop.d1 { left:24px; } .drop.d2 { left:48px; top:52px; } .drop.d3 { left:62px; top:61px; }
  .temp-title { text-align:left; }
  .temp-title .cond { font-weight:800; font-size:20px; margin-bottom:4px; }
  .temp { font-weight:900; font-size:41px; letter-spacing:-2px; line-height:.95; }
  .temp small { font-size:23px; font-weight:800; letter-spacing:0; }
  .weather-range { margin-top:14px; font-size:15px; font-weight:800; white-space:nowrap; }
  .divider { height:1px; background:#e3d2b4; margin:16px 0 13px; }
  .weather-meta { display:flex; justify-content:space-between; color:var(--red); font-size:15px; font-weight:800; }

  .apps { position:absolute; z-index:8; top:304px; left:20px; width:252px; display:grid; grid-template-columns: repeat(4, 52px); grid-auto-rows: 82px; column-gap: 16px; row-gap: 12px; }
  .app { appearance: none; border:0; padding:0; margin:0; background:transparent; color:inherit; font:inherit; cursor:pointer; text-align:center; }
  .app:active .app-icon { transform: translateY(2px) scale(.97); }
  .app:focus-visible .app-icon { outline: 3px solid rgba(80,126,219,.45); outline-offset: 4px; }
  .app-icon {
    width:52px; height:52px; border-radius: 11px;
    display:grid; place-items:center; position:relative;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,.08), 0 3px 0 rgba(117,94,57,.14);
    transition: transform .1s ease, filter .18s ease;
    overflow:hidden;
  }
  .app:hover .app-icon { filter: brightness(1.05); }
  .app span.label { display:block; margin-top:7px; font-weight:850; font-size:14px; white-space:nowrap; }
  .b-blue { background:#4d7ed9; } .b-green { background:#61b58c; } .b-orange { background:#e8893f; } .b-gray { background:#777989; } .b-dark { background:#333640; } .b-purple { background:#756aa9; } .b-light { background:#e8e8e8; }
  .cc98-text { color:#fff; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size:17px; font-weight:900; letter-spacing:-1px; }
  .pin-icon { width:34px; height:34px; border:6px solid #fff; border-radius:50% 50% 50% 4px; transform: rotate(-45deg); }
  .pin-icon::after { content:""; position:absolute; width:10px; height:10px; background:#fff; border-radius:50%; left:6px; top:6px; }
  .wechat-icon { position:relative; width:42px; height:34px; }
  .bubble { position:absolute; background:#fff; border-radius: 15px; }
  .bubble::after { content:""; position:absolute; width:0; height:0; border-style:solid; }
  .bubble.one { width:29px; height:21px; left:0; top:4px; }
  .bubble.one::after { border-width:5px 5px 0 0; border-color:#fff transparent transparent transparent; left:7px; bottom:-4px; }
  .bubble.two { width:24px; height:18px; right:0; top:12px; opacity:.95; }
  .bubble.two::after { border-width:4px 0 0 5px; border-color:#fff transparent transparent transparent; right:5px; bottom:-3px; }
  .eye { position:absolute; width:4px; height:4px; background:#61b58c; top:12px; border-radius:1px; }
  .eye.e1 { left:8px; } .eye.e2 { left:18px; } .eye.e3 { right:12px; top:19px; } .eye.e4 { right:5px; top:19px; }
  .card-icon { width:35px; height:26px; background:#f7fbff; border:3px solid #fff; border-radius:3px; position:relative; }
  .card-icon::before { content:""; position:absolute; left:0; top:4px; right:0; height:5px; background:#d9c083; }
  .card-icon::after { content:""; position:absolute; left:5px; bottom:4px; width:8px; height:6px; background:#ec9d3f; }
  .runner { position:relative; width:40px; height:40px; }
  .runner::before { content:""; position:absolute; right:7px; top:2px; width:8px; height:8px; background:#fff; border-radius:50%; box-shadow: 8px 2px 0 -2px #fff; }
  .runner .body { position:absolute; left:16px; top:12px; width:10px; height:20px; background:#fff; transform: skewX(-16deg); }
  .runner .arm1 { position:absolute; left:24px; top:15px; width:15px; height:6px; background:#fff; transform: rotate(-33deg); transform-origin:left center; }
  .runner .arm2 { position:absolute; left:10px; top:19px; width:13px; height:6px; background:#fff; transform: rotate(37deg); }
  .runner .leg1 { position:absolute; left:12px; top:29px; width:20px; height:6px; background:#fff; transform: rotate(-45deg); }
  .runner .leg2 { position:absolute; left:22px; top:30px; width:18px; height:6px; background:#fff; transform: rotate(33deg); }
  .gear { font-size:34px; color:#f4f5f7; font-family: Georgia, serif; line-height:1; text-shadow: 2px 0 0 rgba(255,255,255,.15); }
  .moon { width:28px; height:28px; border-radius:50%; background:#ffdfa1; position:relative; }
  .moon::before { content:""; position:absolute; right:-2px; top:-4px; width:28px; height:28px; border-radius:50%; background:#333640; }
  .star { position:absolute; background:#ffdfa1; width:4px; height:4px; box-shadow: 10px -8px 0 #ffdfa1, 17px 5px 0 -1px #ffdfa1; }
  .control { width:34px; height:31px; position:relative; }
  .control::before, .control::after { content:""; position:absolute; width:20px; height:22px; border:3px solid #fff; border-radius:4px; }
  .control::before { left:2px; top:2px; } .control::after { right:2px; bottom:1px; }
  .zjuding-img { width:48px; height:48px; object-fit:contain; image-rendering:auto; filter: saturate(1.05) contrast(.95); }

  .notifications { position:absolute; z-index:9; left:16px; right:16px; bottom:86px; display:grid; gap:9px; }
  .note { display:grid; grid-template-columns: 44px 1fr 46px; align-items:center; gap:12px; min-height:58px; padding:10px 12px; background:rgba(255,248,226,.77); border:1px solid var(--line); border-radius:14px; box-shadow: 0 2px 0 rgba(178,149,96,.20); backdrop-filter: blur(2px); cursor:pointer; }
  .note:active { transform: translateY(1px); }
  .mini { width:35px; height:35px; border-radius:7px; display:grid; place-items:center; transform: scale(.92); }
  .mini .cc98-text { font-size:11px; }
  .note-title { font-weight:900; font-size:18px; line-height:1.1; }
  .note-msg { margin-top:4px; font-size:14px; font-weight:700; line-height:1.25; }
  .note-time { align-self:start; text-align:right; font-size:14px; font-weight:900; color:#d35a66; padding-top:2px; }

  .page-dots { position:absolute; z-index:20; bottom:52px; left:0; right:0; display:flex; justify-content:center; gap:12px; }
  .dot { width:9px; height:9px; border-radius:50%; border:0; background:#c5c3b9; padding:0; cursor:pointer; }
  .dot.active { background:#31333a; }

  .toast {
    position:absolute; z-index:50; left:50%; bottom:30px; transform:translateX(-50%) translateY(120px);
    background: var(--toast); border:1px solid var(--line); box-shadow: 0 8px 30px rgba(84,61,31,.23); border-radius:14px;
    padding:10px 16px; font-size:14px; font-weight:800; max-width: 86%; text-align:center; opacity:0;
    transition: .28s ease;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  .panel, .modal-back { position:absolute; inset:0; z-index:45; display:none; }
  .panel.show, .modal-back.show { display:block; }
  .panel::before, .modal-back::before { content:""; position:absolute; inset:0; background:rgba(66,51,35,.16); backdrop-filter: blur(2px); }
  .control-panel {
    position:absolute; left:28px; right:28px; bottom:76px; padding:18px;
    background:rgba(255,248,226,.93); border:1px solid var(--line); border-radius:20px; box-shadow:0 18px 45px rgba(62,48,29,.22);
  }
  .panel-title { font-size:18px; font-weight:950; margin-bottom:12px; }
  .toggles { display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; }
  .toggle { border:1px solid #dac8a9; background:#fff8e2; border-radius:13px; height:58px; font-weight:900; font-size:14px; cursor:pointer; }
  .toggle.on { background:#e3f2ff; }
  .slider { margin-top:14px; height:12px; background:#dfd1b7; border-radius:99px; overflow:hidden; }
  .slider i { display:block; height:100%; width:68%; background:#7daee2; }
  .close { margin-top:14px; width:100%; height:42px; border:0; border-radius:12px; background:#31333a; color:#fff; font-weight:900; cursor:pointer; }

  .modal-card { position:absolute; left:24px; right:24px; top:50%; transform:translateY(-50%); background:rgba(255,248,226,.96); border:1px solid var(--line); border-radius:22px; box-shadow:0 18px 48px rgba(62,48,29,.24); padding:20px; }
  .modal-card h2 { margin:0 0 10px; font-size:22px; }
  .modal-card p { margin:0 0 16px; font-size:15px; line-height:1.6; font-weight:700; }
  .modal-actions { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
  .modal-actions button { border:0; border-radius:12px; height:42px; font-weight:900; cursor:pointer; }
  .primary { background:#4d7ed9; color:#fff; }
  .ghost { background:#eee0c1; color:#4b3d2a; }

  .dark { --paper: #222431; --paper-2:#34364b; --ink:#f6f2df; --line:#67606b; --shadow: rgba(0,0,0,.35); --toast:rgba(41,43,56,.96); }
  .dark .phone { background: linear-gradient(135deg, #202232 0%, #2a2c3e 55%, #312a3d 100%); color:var(--ink); }
  .dark .weather-card, .dark .note, .dark .control-panel, .dark .modal-card { background: rgba(37,39,53,.76); border-color:#666071; }
  .dark .campus-base, .dark .tower, .dark .portal, .dark .steps, .dark .plinth, .dark .trees { opacity:.45; }
  .dark .cloud { opacity:.25; }
  .dark .divider { background:#625b67; }
  .dark .status, .dark .status .battery, .dark .status .wifi { color:#f6f2df; }
  .dark .wifi span { border-top-color:#f6f2df; }
  .dark .wifi span:nth-child(3) { background:#f6f2df; }
  .dark .battery { border-color:#f6f2df; } .dark .battery::after { background:#f6f2df; }

  @media (max-height: 790px) {
    .phone { width: min(100vw, 400px); }
    .notifications { bottom:58px; gap:7px; }
    .note { min-height:54px; padding:8px 10px; }
    .page-dots { bottom:30px; }
  }
</style>
</head>
<body>
  <main class="phone" id="phone" aria-label="像素风浙大首页">
    <div class="background" aria-hidden="true">
      <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div><div class="small-cloud"></div>
      <div class="campus-base"></div>
      <div class="tower"><div class="tower-top"><i class="slot"></i><i class="slot"></i></div><div class="tower-body"><div class="clock"></div></div></div>
      <div class="portal"></div><div class="steps"><span></span><span></span><span></span><span></span><span></span><span></span></div><div class="plinth"></div>
      <div class="trees"><div class="trunk"></div><div class="leaf l1"></div><div class="leaf l2"></div><div class="leaf l3"></div><div class="leaf l4"></div></div><div class="lake"></div>
    </div>

    <header class="status" aria-label="状态栏">
      <div class="time">07:55</div>
      <div class="status-right"><strong>ZJUWLAN</strong><div class="wifi"><span></span><span></span><span></span></div><span>17%</span><div class="battery"><i></i></div></div>
    </header>

    <section class="weather-card" role="button" tabindex="0" data-action="weather" aria-label="天气：小雨，18 摄氏度">
      <div class="weather-top">
        <div class="rain-icon pixelated"><div class="cloud-pixel"></div><i class="drop d1"></i><i class="drop d2"></i><i class="drop d3"></i></div>
        <div class="temp-title"><div class="cond">小雨</div><div class="temp">18<small>°C</small></div></div>
      </div>
      <div class="weather-range">最高 20°C / 最低 15°C</div>
      <div class="divider"></div>
      <div class="weather-meta"><span>空气湿度 88%</span><span>西南风 2级</span></div>
    </section>

    <section class="apps" aria-label="应用">

  }
  function openModal(title, text) {
    modalTitle.textContent = title;
    modalText.textContent = text;
    modal.classList.add('show');
  }
  function closeModal() { modal.classList.remove('show'); }

  document.querySelectorAll('.app').forEach(btn => {
    btn.addEventListener('click', () => {
      const app = btn.dataset.app;
      if (app === '暗色模式') { document.body.classList.toggle('dark'); showToast(document.body.classList.contains('dark') ? '已切换为暗色模式' : '已切回浅色模式'); return; }
      if (app === '控制中心') { panel.classList.add('show'); return; }
      const [title, text] = messages[app] || [app, '正在打开。'];
      openModal(title, text);
    });
  });

  document.querySelectorAll('.note').forEach(note => {
    note.addEventListener('click', () => {
      const name = note.dataset.note;
      const [title, text] = messages[name] || [name, note.querySelector('.note-msg')?.textContent || ''];
      openModal(title, text);
    });
  });

  document.querySelector('.weather-card').addEventListener('click', () => openModal('天气', messages['天气'][1] + ' 雨天建议：带伞，少信“马上到”。'));
  document.querySelector('.weather-card').addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.currentTarget.click(); } });
  document.querySelector('[data-close-panel]').addEventListener('click', () => panel.classList.remove('show'));
  panel.addEventListener('click', e => { if (e.target === panel) panel.classList.remove('show'); });
  document.querySelectorAll('[data-close-modal], [data-primary]').forEach(b => b.addEventListener('click', closeModal));
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

  document.querySelectorAll('.toggle').forEach(t => t.addEventListener('click', () => { t.classList.toggle('on'); showToast(t.textContent + (t.classList.contains('on') ? ' 已开启' : ' 已关闭')); }));
  document.querySelectorAll('.dot').forEach(dot => dot.addEventListener('click', () => {
    document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    showToast('已切换到第 ' + dot.dataset.page + ' 页');
  }));
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); panel.classList.remove('show'); } });
</script>
</body>
</html>
