<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>OPPO 下拉菜单 · 超细像素图标版</title>
<style>
  :root{
    --screen-w:430px;
    --blue:#0676f9;
    --green:#08ad36;
    --red:#db3c31;
    --yellow:#f5b400;
    --glass:rgba(178,178,178,.58);
    --glass-2:rgba(181,181,181,.50);
    --glass-3:rgba(196,196,196,.45);
    --white:#f7f7f7;
    --txt:#fff;
    --muted:rgba(255,255,255,.70);
    --inactive-icon:#fff;
    --shadow:0 16px 42px rgba(0,0,0,.09), inset 0 1px rgba(255,255,255,.13);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:#8e908c;color:#fff;}
  body{display:flex;justify-content:center;align-items:flex-start;overflow:auto;}
  .phone{
    width:min(100vw,var(--screen-w));
    min-height:min(100svh,946px);
    height:max(100svh,946px);
    position:relative;
    overflow:hidden;
    background:
      radial-gradient(170px 260px at -18% 28%, rgba(68,63,126,.42), transparent 70%),
      radial-gradient(190px 360px at -5% 46%, rgba(58,150,206,.50), transparent 72%),
      radial-gradient(220px 360px at 8% 73%, rgba(62,160,113,.48), transparent 74%),
      radial-gradient(280px 390px at 52% 92%, rgba(119,116,126,.52), transparent 78%),
      linear-gradient(180deg,#8f918e 0%,#929491 56%,#888a86 100%);
    isolation:isolate;
  }
  .phone::before{
    content:"";
    position:absolute;inset:-40px;
    backdrop-filter:blur(22px) saturate(1.12);
    -webkit-backdrop-filter:blur(22px) saturate(1.12);
    background:rgba(150,150,150,.16);
    z-index:-1;
  }
  svg{display:block;overflow:visible}
  button{font:inherit;color:inherit;border:0;background:none;padding:0;cursor:pointer;user-select:none}
  .status{display:flex;align-items:center;justify-content:space-between;padding:48px 41px 0 42px;font-weight:800;letter-spacing:.2px;}
  .time{font-size:17px;line-height:1;text-shadow:0 1px 2px rgba(0,0,0,.06)}
  .status-icons{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.88);font-size:10px;font-weight:900}
  .battery{height:14px;width:28px;border-radius:5px;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;color:#707070;font-size:10px;line-height:1;position:relative;overflow:hidden;}
  .battery::before{content:"";position:absolute;left:0;top:0;bottom:0;width:39%;background:#20c954;z-index:-0}
  .battery span{position:relative;z-index:1;color:#767676}
  .bolt{font-size:16px;margin-left:1px;color:rgba(255,255,255,.85);line-height:1}
  .header{display:flex;align-items:center;justify-content:space-between;padding:42px 41px 0 42px;}
  .date{font-size:20px;font-weight:900;letter-spacing:.4px;text-shadow:0 1px 2px rgba(0,0,0,.04)}
  .head-actions{display:flex;gap:14px;align-items:center;}
  .round-mini{width:40px;height:40px;border-radius:50%;background:rgba(188,188,188,.55);display:grid;place-items:center;color:#fff;box-shadow:inset 0 1px rgba(255,255,255,.11);transition:.18s ease;}
  .round-mini:active{transform:scale(.94);background:rgba(230,230,230,.48)}
  .round-mini svg{width:21px;height:21px;stroke-width:2.8}
  .content{padding:0 41px 22px 42px;margin-top:38px;}
  .quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .quick-card{height:72px;border-radius:25px;background:var(--glass);box-shadow:var(--shadow);display:flex;align-items:center;padding:11px 17px 11px 12px;text-align:left;transition:.18s ease;overflow:hidden;}
  .quick-card:active{transform:scale(.982)}
  .quick-card.active .bubble{background:rgba(250,250,250,.96);color:var(--blue)}
  .bubble{width:50px;height:50px;min-width:50px;border-radius:50%;background:rgba(240,240,240,.94);display:grid;place-items:center;color:var(--blue);margin-right:8px;transition:.18s ease;}
  .quick-card:not(.active) .bubble{background:rgba(186,186,186,.6);color:#fff;}
  .quick-text{min-width:0;line-height:1.06;}
  .quick-title{font-size:18px;font-weight:900;letter-spacing:.1px;white-space:normal;word-break:break-word;}
  .quick-sub{font-size:15px;margin-top:6px;color:rgba(255,255,255,.66);font-weight:800;}
  .controls{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:76px;gap:16px;margin-top:16px;}
  .big-card,.small-card,.vslider,.circle{background:var(--glass-2);box-shadow:var(--shadow);}
  .big-card{grid-column:span 2;grid-row:span 2;border-radius:25px;padding:17px;position:relative;text-align:left;overflow:hidden;}
  .music-icon{width:50px;height:50px;border-radius:12px;background:rgba(213,213,213,.32);display:grid;place-items:center;color:rgba(255,255,255,.34);}
  .cast{position:absolute;top:24px;right:24px;color:#fff;opacity:.95}
  .media-title{position:absolute;left:18px;top:82px;font-size:19px;color:rgba(255,255,255,.53);font-weight:600;letter-spacing:.2px}
  .media-row{position:absolute;left:26px;right:26px;bottom:26px;display:flex;align-items:center;justify-content:space-between;color:rgba(255,255,255,.88)}
  .media-row button{width:32px;height:32px;display:grid;place-items:center;opacity:.95;transition:.16s ease}.media-row button:active{transform:scale(.88)}
  .media-row button.dim{opacity:.18}
  .play svg{width:34px;height:34px;fill:currentColor;stroke:none}
  .vslider{grid-row:span 2;border-radius:28px;position:relative;overflow:hidden;background:rgba(184,184,184,.52);touch-action:none;cursor:ns-resize;}
  .vslider .fill{position:absolute;left:0;right:0;bottom:0;height:38%;background:rgba(245,245,245,.93);border-radius:0 0 28px 28px;transition:height .08s linear;}
  .vslider .slider-icon{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);z-index:2;transition:bottom .08s linear;color:var(--blue);}
  .vslider.bright .slider-icon{color:var(--yellow)}
  .vslider .slider-icon svg{width:28px;height:28px;stroke-width:2.7}.vslider.bright .slider-icon svg{fill:currentColor;stroke:currentColor}
  .small-card{border-radius:25px;display:grid;place-items:center;color:#fff;background:rgba(182,182,182,.48);transition:.18s ease;}
  .small-card svg{width:36px;height:36px;stroke-width:2.5;opacity:.9}.small-card:active{transform:scale(.94)}.small-card.active{background:rgba(245,245,245,.92);color:var(--blue)}
  .tile-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px 16px;margin-top:24px;}
  .toggle{height:100px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;transition:.18s ease;}
  .toggle:active .circle{transform:scale(.94)}
  .circle{width:76px;height:76px;border-radius:50%;display:grid;place-items:center;background:rgba(181,181,181,.52);color:#fff;transition:.2s ease;}
  .circle svg{width:34px;height:34px;stroke-width:2.6}.circle .text-icon{font-size:31px;font-weight:900;line-height:1;letter-spacing:-3px}
  .toggle.active .circle{background:rgba(248,248,248,.96);color:var(--on-color,var(--blue));}
  .toggle .label{font-size:13.5px;line-height:1.15;margin-top:9px;font-weight:900;text-shadow:0 1px 1px rgba(0,0,0,.05);white-space:nowrap;color:rgba(255,255,255,.94);}
  .arrow{font-size:10px;vertical-align:1px;margin-left:2px;opacity:.9}
  .pager{display:flex;justify-content:center;gap:10px;margin-top:11px}.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.46);transition:.2s}.dot.active{background:#fff}
  .home{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);width:143px;height:5px;border-radius:99px;background:rgba(255,255,255,.88)}
  .toast{position:absolute;left:50%;bottom:58px;transform:translate(-50%,20px);opacity:0;background:rgba(55,55,55,.76);color:#fff;border-radius:999px;padding:10px 18px;font-size:13px;font-weight:700;pointer-events:none;transition:.23s ease;white-space:nowrap;z-index:20;backdrop-filter:blur(8px)}
  .toast.show{opacity:1;transform:translate(-50%,0)}
  .sheet{position:absolute;left:22px;right:22px;bottom:38px;background:rgba(196,196,196,.62);border-radius:26px;padding:18px 18px 20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,.18), inset 0 1px rgba(255,255,255,.15);opacity:0;transform:translateY(24px);pointer-events:none;transition:.22s ease;z-index:15;}
  .sheet.show{opacity:1;transform:translateY(0);pointer-events:auto}.sheet h3{margin:0 0 10px;font-size:17px}.sheet p{margin:0;color:rgba(255,255,255,.84);font-size:13.5px;line-height:1.6}.sheet-close{position:absolute;right:12px;top:10px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.18);display:grid;place-items:center;font-size:20px;}
  @media (max-width:380px){.status{padding-left:34px;padding-right:34px}.header{padding-left:34px;padding-right:34px}.content{padding-left:34px;padding-right:34px}.quick-title{font-size:16px}.quick-sub{font-size:13px}.tile-grid{gap:18px 12px}.controls{gap:12px}.quick-grid{gap:12px}.circle{width:70px;height:70px}.toggle{height:94px}.round-mini{width:38px;height:38px}}


/* ===== 细像素锯齿化处理：保留原玻璃视觉，仅把圆角做成接近弧线的像素阶梯 ===== */
:root{
  --px-step:2px;
  --j-r:26px;
  --j-r-lg:28px;
  --j-r-sm:14px;
  --pixel-line:rgba(255,255,255,.055);
  --pixel-dark:rgba(0,0,0,.032);
}
html,body{image-rendering:auto;}
.phone{
  image-rendering:pixelated;
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,.014) 0 1px, transparent 1px 2px),
    repeating-linear-gradient(90deg, rgba(0,0,0,.012) 0 1px, transparent 1px 2px),
    radial-gradient(170px 260px at -18% 28%, rgba(68,63,126,.42), transparent 70%),
    radial-gradient(190px 360px at -5% 46%, rgba(58,150,206,.50), transparent 72%),
    radial-gradient(220px 360px at 8% 73%, rgba(62,160,113,.48), transparent 74%),
    radial-gradient(280px 390px at 52% 92%, rgba(119,116,126,.52), transparent 78%),
    linear-gradient(180deg,#8f918e 0%,#929491 56%,#888a86 100%);
  background-size:2px 2px,2px 2px,auto,auto,auto,auto,auto;
}
.phone::after{
  content:"";
  position:absolute;inset:0;z-index:10;pointer-events:none;
  background:
    repeating-linear-gradient(0deg, transparent 0 1px, rgba(255,255,255,.052) 1px 2px),
    repeating-linear-gradient(90deg, transparent 0 1px, rgba(0,0,0,.028) 1px 2px);
  opacity:.15;
  mix-blend-mode:soft-light;
}
svg,svg *{
  shape-rendering:crispEdges!important;
  stroke-linecap:square!important;
  stroke-linejoin:miter!important;
}
button,.quick-card,.big-card,.small-card,.vslider,.circle,.round-mini,.bubble,.music-icon,.sheet,.toast{transition-timing-function:steps(5,end)!important;}
.quick-card,.big-card,.small-card,.vslider,.round-mini,.bubble,.music-icon,.circle,.sheet,.toast,.home,.dot{
  position:relative;
  overflow:hidden;
}

  clip-path:polygon(
    var(--j-r) 0,

.small-card,.quick-card{--j-r:26px;}
.toast{--j-r:24px;}

  border-radius:0!important;
}

  background:

  mix-blend-mode:soft-light;

:is(.quick-card,.big-card,.small-card,.vslider,.circle,.round-mini,.bubble,.music-icon,.sheet,.toast)>*{position:relative;z-index:4;}

.bubble svg{width:34px;height:34px;stroke-width:2.4!important;}
.small-card svg{width:34px;height:34px;stroke-width:2.25!important;}
.circle svg{width:33px;height:33px;stroke-width:2.25!important;}

  font-family:"Courier New",ui-monospace,monospace!important;

<main class="phone" aria-label="仿 OPPO 控制中心">
  <section class="status" aria-label="状态栏">
    <div class="time">00:19</div>
    <div class="status-icons">
      <span style="font-size:13px">▣</span><svg width="12" height="18"><use href="#i-bluetooth"/></svg><span style="border:2px solid currentColor;border-radius:3px;padding:1px 2px;font-size:8px">HD</span><span>1</span><svg width="19" height="16"><use href="#i-wifi"/></svg><strong>5G</strong><span style="font-size:17px;letter-spacing:-2px">▂▅▇</span><span style="opacity:.38;font-size:17px;letter-spacing:-2px">▂▆</span><div class="battery"><span>27</span></div><span class="bolt">⚡</span>
    </div>
  </section>
  <section class="header">
    <div class="date">7月9日 周四</div>
    <div class="head-actions">
      <button class="round-mini" data-sheet="编辑"><svg><use href="#i-pen"/></svg></button>
      <button class="round-mini" data-sheet="设置"><svg><use href="#i-gear"/></svg></button>
      <button class="round-mini" data-sheet="更多"><svg><use href="#i-more"/></svg></button>
    </div>
  </section>

  <section class="content">
    <div class="quick-grid">
      <button class="quick-card active" id="wifiBtn" aria-pressed="true">
        <span class="bubble"><svg width="35" height="35"><use href="#i-wifi"/></svg></span>
        <span class="quick-text"><span class="quick-title">ZJUWLAN<br>-Secure</span><span class="quick-sub" id="wifiSub">已连接</span></span>
      </button>
      <button class="quick-card active" id="btBtn" aria-pressed="true">
        <span class="bubble"><svg width="35" height="35"><use href="#i-bluetooth"/></svg></span>
        <span class="quick-text"><span class="quick-title">蓝牙</span><span class="quick-sub" id="btSub">开</span></span>
      </button>
    </div>

    <div class="controls">
      <div class="big-card" id="mediaCard">
        <div class="music-icon"><svg width="34" height="34"><use href="#i-music"/></svg></div>
        <button class="cast" aria-label="投放" data-toast="投放设备"><svg width="31" height="31"><use href="#i-cast"/></svg></button>
        <div class="media-title" id="mediaText">未在播放</div>
        <div class="media-row">
          <button class="dim" data-toast="上一首"><svg width="28" height="28"><use href="#i-prev"/></svg></button>
          <button class="play" id="playBtn" aria-label="播放"><svg><use id="playIcon" href="#i-play"/></svg></button>
          <button class="dim" data-toast="下一首"><svg width="28" height="28"><use href="#i-next"/></svg></button>
        </div>
      </div>

      <div class="vslider bright" data-value="33" aria-label="亮度滑块">
        <div class="fill"></div><div class="slider-icon"><svg><use href="#i-sun"/></svg></div>
      </div>
      <div class="vslider volume" data-value="26" aria-label="音量滑块">
        <div class="fill"></div><div class="slider-icon"><svg><use href="#i-speaker"/></svg></div>
      </div>

      <button class="small-card" data-toast="智能音箱"><svg><use href="#i-speakerbox"/></svg></button>
      <button class="small-card" data-toast="电脑连接"><svg><use href="#i-laptop"/></svg></button>
      <button class="small-card" data-toast="耳机"><svg><use href="#i-headphones"/></svg></button>
      <button class="small-card" data-toast="扫码 / 识别"><svg><use href="#i-target"/></svg></button>
    </div>

    <div class="tile-grid">
      <button class="toggle active" style="--on-color:var(--green)" data-name="移动数据"><span class="circle"><span class="text-icon">1↓</span></span><span class="label">0 B<span class="arrow">▼</span></span></button>
      <button class="toggle active" style="--on-color:var(--red)" data-name="振动"><span class="circle"><svg><use href="#i-phone-vibrate"/></svg></span><span class="label">振动</span></button>
      <button class="toggle" data-name="手电筒"><span class="circle"><svg><use href="#i-flashlight"/></svg></span><span class="label">手电筒<span class="arrow">▼</span></span></button>
      <button class="toggle active" style="--on-color:var(--blue)" data-name="定位服务"><span class="circle"><svg><use href="#i-location"/></svg></span><span class="label">定位服务</span></button>

      <button class="toggle" data-name="飞行模式"><span class="circle"><svg><use href="#i-plane"/></svg></span><span class="label">飞行模式</span></button>
      <button class="toggle" data-name="自动旋转"><span class="circle"><svg><use href="#i-rotate"/></svg></span><span class="label">自动旋转</span></button>
      <button class="toggle" data-name="免打扰"><span class="circle"><svg><use href="#i-moon"/></svg></span><span class="label">免打扰<span class="arrow">▼</span></span></button>
      <button class="toggle" data-name="OPPO 互传"><span class="circle"><svg><use href="#i-oppo"/></svg></span><span class="label">OPPO 互传<span class="arrow">▼</span></span></button>

      <button class="toggle" data-name="省电模式"><span class="circle"><svg><use href="#i-battery-save"/></svg></span><span class="label">省电模式</span></button>
      <button class="toggle" data-name="暗色模式"><span class="circle"><svg><use href="#i-dark"/></svg></span><span class="label">暗色模式</span></button>
      <button class="toggle" data-name="截屏"><span class="circle"><svg><use href="#i-scissors"/></svg></span><span class="label">截屏<span class="arrow">▼</span></span></button>
      <button class="toggle" data-name="屏幕录制"><span class="circle"><svg><use href="#i-video"/></svg></span><span class="label">屏幕录制<span class="arrow">▼</span></span></button>
    </div>
    <div class="pager"><button class="dot active" aria-label="第 1 页"></button><button class="dot" aria-label="第 2 页"></button></div>

  <div class="sheet" id="sheet" aria-hidden="true"><button class="sheet-close" id="sheetClose">×</button><h3 id="sheetTitle">设置</h3><p id="sheetText">这是仿系统下拉菜单的交互弹层。所有圆形功能键、Wi‑Fi/蓝牙卡片、播放键和亮度/音量滑块均可点击或拖动。</p></div>
  <div class="toast" id="toast">已切换</div>
  <div class="home" aria-hidden="true"></div>
</main>

<script>
(() => {
  const $ = (s, root=document) => root.querySelector(s);
  const $$ = (s, root=document) => [...root.querySelectorAll(s)];
  const toast = $('#toast');
  let toastTimer;
  function showToast(text){
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>toast.classList.remove('show'), 1200);
  }

  function toggleCard(btn, subEl, onText, offText, name){
    btn.classList.toggle('active');
    const on = btn.classList.contains('active');
    btn.setAttribute('aria-pressed', on);
    subEl.textContent = on ? onText : offText;
    showToast(`${name}${on ? '已开启' : '已关闭'}`);
  }
  $('#wifiBtn').addEventListener('click', e => toggleCard(e.currentTarget, $('#wifiSub'), '已连接', '已关闭', 'Wi‑Fi '));
  $('#btBtn').addEventListener('click', e => toggleCard(e.currentTarget, $('#btSub'), '开', '关', '蓝牙'));

  $$('.toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      const on = btn.classList.contains('active');
      btn.setAttribute('aria-pressed', on);
      showToast(`${btn.dataset.name}${on ? '已开启' : '已关闭'}`);
    });
  });
  $$('.small-card').forEach(btn => btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    showToast(btn.dataset.toast || '已点击');
  }));
  $$('[data-toast]').forEach(btn => btn.addEventListener('click', (e) => {
    if(btn.classList.contains('small-card')) return;
    showToast(btn.dataset.toast);
  }));

  let playing = false;
  $('#playBtn').addEventListener('click', () => {
    playing = !playing;
    $('#playIcon').setAttribute('href', playing ? '#i-pause' : '#i-play');
    $('#mediaText').textContent = playing ? '正在播放' : '未在播放';
    showToast(playing ? '开始播放' : '已暂停');
  });

  function setSlider(el, value){
    value = Math.max(0, Math.min(100, value));
    el.dataset.value = Math.round(value);
    $('.fill', el).style.height = value + '%';
    $('.slider-icon', el).style.bottom = Math.max(18, Math.min(132, value * 1.28 + 4)) + 'px';
  }
  $$('.vslider').forEach(el => {
    setSlider(el, Number(el.dataset.value || 35));
    function update(clientY){
      const r = el.getBoundingClientRect();
      const value = 100 - ((clientY - r.top) / r.height * 100);
      setSlider(el, value);
      showToast(`${el.classList.contains('bright') ? '亮度' : '音量'} ${Math.round(Math.max(0, Math.min(100, value)))}%`);
    }
    el.addEventListener('pointerdown', e => {
      el.setPointerCapture(e.pointerId);
      update(e.clientY);
      const move = ev => update(ev.clientY);
      const up = () => {
        el.removeEventListener('pointermove', move);
        el.removeEventListener('pointerup', up);
        el.removeEventListener('pointercancel', up);
      };
      el.addEventListener('pointermove', move);
      el.addEventListener('pointerup', up);
      el.addEventListener('pointercancel', up);
    });
  });

  const sheet = $('#sheet');
  const titles = {
    '编辑':['编辑开关','可拖动、排序和增删快捷开关。这里为网页仿制版，点击按钮会展示交互反馈。'],
    '设置':['系统设置','模拟进入设置入口：Wi‑Fi、蓝牙、亮度、音量等控件均已做网页交互。'],
    '更多':['更多选项','模拟更多菜单，可继续扩展重启、关机、隐私保护等入口。']
  };
  $$('[data-sheet]').forEach(btn => btn.addEventListener('click', () => {
    const [h,p] = titles[btn.dataset.sheet];
    $('#sheetTitle').textContent = h;
    $('#sheetText').textContent = p;
    sheet.classList.add('show');
    sheet.setAttribute('aria-hidden','false');
  }));
  $('#sheetClose').addEventListener('click', () => {sheet.classList.remove('show');sheet.setAttribute('aria-hidden','true');});
  sheet.addEventListener('click', e => { if(e.target === sheet) sheet.classList.remove('show'); });
  $$('.dot').forEach((dot, i) => dot.addEventListener('click', () => {
    $$('.dot').forEach(d=>d.classList.remove('active'));
    dot.classList.add('active');
    showToast(i === 0 ? '第 1 页' : '第 2 页');
  }));
})();
</script>
</body>
