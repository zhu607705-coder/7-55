name: Web CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-web:
    name: Verify web build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify campus map contract
        run: npm run map:zijingang

      - name: Type-check source
        run: npm run typecheck

      - name: Build production bundle
        run: npm run build

      - name: Build offline single-file demo
        run: npm run build:single

      - name: Verify offline single-file artifact
        run: npm run verify:single
